services:
  backend:
    build:
      context: ./backend
    container_name: mzansi-backend
    working_dir: /app
    ports:
      - "8000:8000"
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-admin.json
    volumes:
      - ./backend:/app
      - type: bind
        source: ${GOOGLE_APPLICATION_CREDENTIALS}
        target: /run/secrets/firebase-admin.json
        read_only: true

  frontend:
    build:
      context: ./frontend
    container_name: mzansi-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env.local
    environment:
      VITE_BACKEND_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
