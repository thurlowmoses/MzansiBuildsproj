query GetPublicProjects @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public as it only retrieves public projects.") {
  projects(where: {isPublic: {eq: true}}) {
    id
    name
    description
    liveDemoUrl
    githubRepoUrl
    technologiesUsed
    user {
      id
      displayName
      username
    }
  }
}